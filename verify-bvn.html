<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="./media/cowryicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Sign Up | Cowryrise</title>

</head>
<body class="signupBody">
    <section class="loginSec">
        <a href="index.html"class="loginLogo">
            <img src="./media/cowrylogo.svg" alt="">
        </a>

        <div class="d-lg-flex startInvest d-md-flex d-sm-flex">
            <div class="formCon">
                
                <div class="form">
                    <h2>Verify your identity with your BVN</h2>
                    <!-- <div class="jump w-100 my-lg-4">
                        <p>Get an account <a href="login.html">Sign In</a></p>
                    </div> -->
                    
                    
                    <div>
                        <div class="emailInputContainer my-4">
                            <input type="text" class="w-100 p-2" placeholder="Bank Verification Number" required>
                            <label for="emailInput">Bank Verification Number</label>
                        </div>
                        <div class="jump w-100 mb-4">
                            <p class="text-primary" style="font-weight: 600;"><a href="#">Why Do We Need Your BVN?</a></p>
                        </div>
                        <div class="emailInputContainer my-4">
                            <input type="date" class="w-100 p-2" placeholder="Date of Birth" required>
                            <label for="emailInput">Date of Birth</label>
                        </div>
                        <div id="bvnErrorMessage"></div>
                        <div class="jump w-100 mb-4 d-lg-flex align-items-center p-lg-3">
                            <p class="text-primary w-100 my-3" style="font-weight: 600;"><a href="#">Got Issues Adding Your BVN?</a></p>
                            <button type="submit" class="">Continue</button>
                        </div>
                        
                        
                        
                    </div>
                    
                </div>
                <div class="formFooter d-flex justify-content-between mt-4">
                    <p class="d-flex gap-2" >
                        <img src="./media/sec-logo.uViKvy1J.png" alt="">
                        <span>Cowrywise is licensed by the SEC</span>
                    </p>
                    <p> <a href="#">Need Help</a></p>
                </div>
            </div>

            <div class="dontwait">
                <h5>Invest with over 1 million  customers like you</h5>
                <p class="my-3">Wow, great app. It's the most reliable, trusthworth, saving and investment platform</p>
                <h6 class="fs-5 fw-semibold">Precious Oke</h6>
            </div>
        </div>

    </section>



    <button class="rightLogo rightLogo-signup ">
        <img src="./media/cowryicon.png" alt="">
    </button>

<script src="/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

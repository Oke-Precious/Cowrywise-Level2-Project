<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
        
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./media/cowryicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Cowryrise</title>
</head>
<body class="loginBody">
    <section class="loginSec">
        <a href="index.html" class="loginLogo">
            <img src="./media/cowrylogo.svg" alt="">
        </a>

        <div class="d-lg-flex d-md-flex d-sm-flex">
            <div class="jump w-100">
                <h3>Jump right in</h3>
                <h4 class="">Sign in to continue</h4>
                <p>New user? <a href="signup.html">Create Account</a></p>
            </div>

            <div class="formCon w-100">
                <div class="form">
                    <div class="signWith d-lg-flex d-md-flex d-sm-flex justify-content-between gap-3">
                        <a href="#" class="googleSignIn" onclick="signInWithGoogle(event)">
                            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            <span>Sign in with Google</span>
                        </a>
                        <a href="#">
                            <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path fill="#000000" d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.61-2.53 3.44l-.87.5z"/>
                            </svg>
                            <span>Sign in with Apple</span>
                        </a>
                    </div>
                    <div class="d-flex gap-2 align-items-center my-3">
                        <hr class="w-100">
                        <span style="font-size: 12px;">or</span>
                        <hr class="w-100">
                    </div>
                    <div>
                        <div class="emailInputContainer my-4">
                            <input type="email" id="loginEmail" class="w-100 p-3" placeholder="Email Address" required>
                            <label for="loginEmail" id="loginEmailLabel">Email Address</label>
                        </div>
                        <div class="emailInputContainer mt-4 mb-2">
                            <input type="password" id="loginPassword" class="w-100 p-3" placeholder="Password" required>
                            <label for="loginPassword" id="loginPasswordLabel">Password</label>
                        </div>
                        <div id="loginErrorMessage"></div>
                    </div>
                    <a href="#" class="forgetPass">Forgot password?</a>
                    <button onclick="signIn()" class="w-100 p-2 mt-5">Sign In</button>
                </div>
                <div class="formFooter d-flex justify-content-between mt-4">
                    <p>Trouble signing in? <a href="#">Chat with us</a></p>
                    <p>  Privacy   |  Terms</p>
                </div>
            </div>
        </div>
    
    </section>

    <button class="rightLogo">
        <img src="./media/cowryicon.png" alt="">
    </button>

    <!-- Create PIN Modal -->
    <div id="createPINModal" class="pin-modal-overlay">
        <div class="pin-modal">
            <div class="pin-modal-content">
                <svg class="pin-icon" width="60" height="60" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1C6.48 1 2 5.48 2 11v9c0 .55.45 1 1 1h1v3c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-3h6v3c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-3h1c.55 0 1-.45 1-1v-9c0-5.52-4.48-10-10-10zm0 2c4.41 0 8 3.59 8 8H4c0-4.41 3.59-8 8-8z" fill="#1e5fa8" stroke="#1e5fa8" stroke-width="2"/>
                </svg>
                <h3>Create PIN</h3>
                <p>Your PIN adds an extra layer of security to your Cowrywise account</p>
                
                <div class="pin-section mt-4">
                    <label>Create your PIN</label>
                    <div class="pin-inputs-group">
                        <input type="password" class="pin-input create-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                        <input type="password" class="pin-input create-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                        <input type="password" class="pin-input create-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                        <input type="password" class="pin-input create-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                    </div>
                </div>
                
                <div class="pin-section mt-4">
                    <label>Confirm your PIN</label>
                    <div class="pin-inputs-group">
                        <input type="password" class="pin-input confirm-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                        <input type="password" class="pin-input confirm-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                        <input type="password" class="pin-input confirm-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                        <input type="password" class="pin-input confirm-pin-input" inputmode="numeric" oninput="handlePINInput(this); clearPINError()" onkeydown="handlePINBackspace(event, this)" required>
                    </div>
                </div>
                
                <div id="pinErrorMessage" class="pin-error-message"></div>
                
                <button class="pin-create-btn mt-4" onclick="createPIN()">Create PIN</button>
            </div>
        </div>
    </div>





    <!-- Firebase App and Auth SDKs (Compat v10) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="./firebase-config.js"></script>

    <script src="./login.js"></script>
    <script>
        initPINModal();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

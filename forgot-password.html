<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./welcome.css">
    <link rel="stylesheet" href="./forgot-password.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="./media/cowryicon.png">
    
    <title>Reset Password | Cowrywise</title>
</head>
<body>
    <!-- Top Brand Logo -->
    <header class="logo-header">
        <a href="index.html">
            <img src="./media/cowrylogo.svg" alt="Cowrywise Logo">
        </a>
    </header>

    <!-- Main Content Container -->
    <main class="welcome-container" style="align-items: center; justify-content: space-between; gap: 40px;">
        <!-- Left Side: Header Title -->
        <section class="left-section">
            <h1 class="main-question" style="font-size: clamp(32px, 5vw, 48px); line-height: 1.15;">Reset Password</h1>
        </section>

        <!-- Right Side: Reset Form -->
        <section class="right-section d-flex flex-column align-items-center" style="flex: 1; max-width: 480px; width: 100%;">
            <div class="reset-box">
                <input type="email" id="resetEmail" class="reset-input" placeholder="Enter your email address" required>
                
                <!-- Status Messages -->
                <div id="statusSuccess" class="status-msg status-success d-none" style="display: none;">
                    ● Password reset email sent successfully
                </div>
                <div id="statusError" class="status-msg status-error d-none" style="display: none;">
                    ● Something went wrong, please try again
                </div>

                <button id="resetBtn" onclick="sendResetEmail()" class="continue-btn active" style="width: 100%; margin-top: 12px !important; border-radius: 8px;">Send Reset Password</button>
            </div>
            
            <div class="reset-footer">
                <p>Still got trouble? <a href="mailto:support@cowrywise.com">Contact support</a></p>
                <p><a href="login.html">Back to Login</a></p>
            </div>
        </section>
    </main>

    <footer class="sec-footer">
        Licensed by the SEC
    </footer>

    <!-- Firebase Script CDNs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="./firebase-config.js"></script>

    <script>
        function sendResetEmail() {
            const emailInput = document.getElementById('resetEmail');
            const successDiv = document.getElementById('statusSuccess');
            const errorDiv = document.getElementById('statusError');
            const resetBtn = document.getElementById('resetBtn');

            if (!emailInput || !successDiv || !errorDiv || !resetBtn) return;

            const email = emailInput.value.trim();

            // Clear previous states
            successDiv.style.display = 'none';
            successDiv.classList.add('d-none');
            errorDiv.style.display = 'none';
            errorDiv.classList.add('d-none');
            emailInput.style.borderColor = '#E5E5E5';

            if (email === "" || !email.includes("@")) {
                errorDiv.textContent = "● Please enter a valid email address";
                errorDiv.style.display = 'flex';
                errorDiv.classList.remove('d-none');
                emailInput.style.borderColor = '#FF3B30';
                return;
            }

            // Disable button during call
            resetBtn.disabled = true;
            resetBtn.textContent = "Sending...";

            auth.sendPasswordResetEmail(email)
                .then(() => {
                    successDiv.style.display = 'flex';
                    successDiv.classList.remove('d-none');
                    emailInput.value = "";
                    resetBtn.disabled = false;
                    resetBtn.textContent = "Send Reset Password";
                })
                .catch((error) => {
                    console.error("Reset password error:", error);
                    let userFriendlyMsg = "Something went wrong, please try again";
                    if (error.code === "auth/user-not-found") {
                        userFriendlyMsg = "No account found with this email address";
                    } else if (error.code === "auth/invalid-email") {
                        userFriendlyMsg = "Please enter a valid email address";
                    }
                    errorDiv.textContent = "● " + userFriendlyMsg;
                    errorDiv.style.display = 'flex';
                    errorDiv.classList.remove('d-none');
                    emailInput.style.borderColor = '#FF3B30';
                    resetBtn.disabled = false;
                    resetBtn.textContent = "Send Reset Password";
                });
        }
    </script>
</body>
</html>

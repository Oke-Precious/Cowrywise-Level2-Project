<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="./media/cowryicon.png">
    <link rel="stylesheet" href="welcome.css">
    <title>Welcome | Cowrywise</title>
</head>
<body>
    <!-- Full-screen Page Transition Loader Overlay -->
    <div id="pageTransitionLoader" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #ffffff; z-index: 99999; display: flex; align-items: center; justify-content: center;">
        <img src="./media/cowrywiseloader.gif" alt="Loading..." style="width: clamp(100px, 15vw, 200px); height: auto;">
    </div>

    <!-- Top Brand Logo -->
    <header class="logo-header">
        <a href="index.html">
            <img src="./media/cowrylogo.svg" alt="Cowrywise Logo">
        </a>
    </header>

    <!-- Main Content Container (Step 1: Choose Savings/Investments) -->
    <main class="welcome-container" id="step1Container">
        <!-- Left Side: Greeting -->
        <section class="left-section">
            <p class="greeting-text">Welcome, <span id="username">Adeola</span>!</p>
            <h1 class="main-question">What would you like<br>to do?</h1>
        </section>

        <!-- Right Side: Interaction -->
        <section class="right-section">
            <!-- Selector Cards Row -->
            <div class="cards-row">
                <!-- Savings Option -->
                <div class="option-card savings-card" id="savingsCard" onclick="selectOption('savings')">
                    <h3 class="card-title">Savings</h3>
                    <div class="card-illustration">
                        <img src="./media/welcomesaving.png" alt="Savings vault illustration" id="savingsImg">
                    </div>
                </div>

                <!-- Investments Option -->
                <div class="option-card investments-card" id="investmentsCard" onclick="selectOption('investments')">
                    <h3 class="card-title">Investments</h3>
                    <div class="card-illustration">
                        <img src="./media/welcomeinvestment.png" alt="Investments basket illustration" id="investmentsImg">
                    </div>
                </div>
            </div>

            <!-- Action Button and Proof -->
            <div class="action-container">
                <button class="continue-btn" id="continueBtn" onclick="handleContinue()" disabled>Continue</button>
                <p class="social-proof">
                    <span class="heart-icon">💙</span> Over 2 million people build wealth on Cowrywise.
                </p>
            </div>
        </section>
    </main>

    <!-- Main Content Container (Step 2: Fund Wallet Screen) -->
    <main class="welcome-container d-none" id="step2Container" style="display: none;">
        <!-- Left Side: Fund details input -->
        <section class="left-section fund-input-section">
            <h1 class="main-question">Start saving by<br>funding your wallet</h1>
            <p class="fund-subtitle">How much would you like to start with?</p>
            
            <div class="amount-input-wrapper">
                <span class="currency-symbol">₦</span>
                <input type="text" id="fundAmount" value="1,000" oninput="formatAndValidateAmount(this)" autocomplete="off">
            </div>

            <div id="processingFeeContainer" class="processing-fee-tag">
                + ₦ 15.00 processing fee
            </div>
            
            <div id="fundLimitWarning" class="limit-warning-msg d-none" style="display: none;">
                <span class="warning-dot">●</span> A minimum of ₦ 1,000 is required
            </div>

            <div class="fund-action-container">
                <button class="continue-btn active" id="fundWalletBtn" onclick="handleFundWallet()">Fund wallet</button>
                <button class="back-link-btn" onclick="goBackToStep1()">Back</button>
            </div>
        </section>

        <!-- Right Side: Savings Cards Graphic -->
        <section class="right-section graphics-section">
            <div class="stacked-graphic-wrapper">
                <img src="./media/wallet_savings_cards.png" alt="Cowrywise Savings Cards" class="stacked-cards-img">
            </div>
        </section>
    </main>

    <footer class="sec-footer">
        Licensed by the SEC
    </footer>

    <!-- Firebase CDNs (Compat version) required for saving onboarding choices to Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>

    <script src="./welcome.js"></script>
</body>
</html>

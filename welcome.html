<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="./media/cowryicon.png">
    <link rel="stylesheet" href="welcome.css">
    <title>Welcome | Cowrywise</title>
</head>
<body>
    <!-- Top Brand Logo -->
    <header class="logo-header">
        <a href="index.html">
            <img src="./media/cowrylogo.svg" alt="Cowrywise Logo">
        </a>
    </header>

    <!-- Main Content Container -->
    <main class="welcome-container">
        <!-- Left Side: Greeting -->
        <section class="left-section">
            <p class="greeting-text">Welcome, <span id="username">Adeola</span>!</p>
            <h1 class="main-question">What would you like<br>to do?</h1>
        </section>

        <!-- Right Side: Interaction -->
        <section class="right-section">
            <!-- Selector Cards Row -->
            <div class="cards-row">
                <!-- Savings Option -->
                <div class="option-card savings-card" id="savingsCard" onclick="selectOption('savings')">
                    <h3 class="card-title">Savings</h3>
                    <div class="card-illustration">
                        <img src="./media/welcome-savings.svg" alt="Savings vault illustration" id="savingsImg">
                    </div>
                </div>

                <!-- Investments Option -->
                <div class="option-card investments-card" id="investmentsCard" onclick="selectOption('investments')">
                    <h3 class="card-title">Investments</h3>
                    <div class="card-illustration">
                        <img src="./media/welcome-investments.svg" alt="Investments basket illustration" id="investmentsImg">
                    </div>
                </div>
            </div>

            <!-- Action Button and Proof -->
            <div class="action-container">
                <button class="continue-btn" id="continueBtn" onclick="handleContinue()" disabled>Continue</button>
                <p class="social-proof">
                    <span class="heart-icon">💙</span> Over 2 million people build wealth on Cowrywise.
                </p>
            </div>
        </section>
    </main>

    <!-- SEC Badge Footer -->
    <footer class="sec-footer">
        Licensed by the SEC
    </footer>

    <!-- Interactive Onboarding Logic -->
    <script>
        let selectedOption = null;

        // Fetch registered user name dynamically
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (currentUser && currentUser.firstName) {
                document.getElementById('username').textContent = currentUser.firstName;
            }
        });

        // Toggle selected option card and activate Continue button
        function selectOption(option) {
            selectedOption = option;
            
            const savingsCard = document.getElementById('savingsCard');
            const investmentsCard = document.getElementById('investmentsCard');
            const continueBtn = document.getElementById('continueBtn');

            if (option === 'savings') {
                savingsCard.classList.add('selected');
                investmentsCard.classList.remove('selected');
            } else if (option === 'investments') {
                investmentsCard.classList.add('selected');
                savingsCard.classList.remove('selected');
            }

            // Enable and style button
            continueBtn.disabled = false;
            continueBtn.classList.add('active');
        }

        // Navigate forward
        function handleContinue() {
            if (!selectedOption) return;
            
            if (selectedOption === 'savings') {
                // Navigate to savings dashboard or page
                alert("Redirecting to Savings setup...");
                window.location.href = "index.html"; 
            } else if (selectedOption === 'investments') {
                // Navigate to investments page or dashboard
                alert("Redirecting to Investments setup...");
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
